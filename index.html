<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Form</title>
</head>
<body>

    <h1>Student Registration Form</h1>

    <form>

        <!-- Name -->
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <!-- Email -->
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <!-- Subjects -->
        <p><b>Subjects:</b></p>
        <label><input type="checkbox" name="subject" value="math"> Math</label><br>
        <label><input type="checkbox" name="subject" value="science"> Science</label><br>
        <label><input type="checkbox" name="subject" value="english"> English</label><br><br>

        <!-- Gender -->
        <p><b>Gender:</b></p>
        <label><input type="radio" name="gender" value="male"> Male</label><br>
        <label><input type="radio" name="gender" value="female"> Female</label><br><br>

        <!-- City Dropdown -->
        <label for="city">City:</label><br>
        <select id="city" name="city">
            <option value="delhi">Delhi</option>
            <option value="mumbai">Mumbai</option>
            <option value="bangalore">Bangalore</option>
        </select><br><br>

        <!-- Message -->
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" cols="30"></textarea><br><br>

        <!-- Submit -->
        <button type="submit">Submit</button>

    </form>

</body>
</html>
